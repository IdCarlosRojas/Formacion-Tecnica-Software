{% extends "Base.html" %}
{% block title %}Dejar Reseña{% endblock %}

{% block content %}
<div class="form-container" style="max-width: 600px;">
  <form method="POST">
    <h2 style="text-align: center;">Dejar Reseña</h2>
    <p style="text-align: center; margin-top: -1rem; margin-bottom: 2rem; color: var(--color-text-muted);">
      Para tu cita con <strong>{{ cita.tatuador.nombre }}</strong> 
      del día {{ cita.fecha }}.
    </p>
    
    <div class="form-group">
      <label for="calificacion">Calificación (5 estrellas es lo mejor)</label>
      <select id="calificacion" name="calificacion" required>
        <option value="5">⭐⭐⭐⭐⭐ (Excelente)</option>
        <option value="4">⭐⭐⭐⭐ (Muy Bueno)</option>
        <option value="3">⭐⭐⭐ (Bueno)</option>
        <option value="2">⭐⭐ (Regular)</option>
        <option value="1">⭐ (Malo)</option>
      </select>
    </div>

    <div class="form-group">
      <label for="comentario">Comentario (Opcional)</label>
      <textarea id="comentario" name="comentario" rows="5" placeholder="Describe tu experiencia..."></textarea>
    </div>
    
    <button type="submit" class="btn btn-primary btn-full">Enviar Reseña</button>
    <a href="{{ url_for('dashboard_cliente') }}" style="color: var(--color-text-muted); text-align: center; display: block; margin-top: 1rem;">Cancelar</a>
  </form>
</div>
{% endblock %}
