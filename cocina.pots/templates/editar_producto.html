{% extends "base.html" %}

{% block title %}Editar Producto - DigitalFood{% endblock %}

{% block content %}
<div class="dashboard-header">
    <h2>✍️ Editar Producto</h2>
    <p>Actualiza la información del producto: {{ producto.nombre }}</p>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('editar_producto', id=producto.id) }}" class="product-form">
        <div class="form-grid">
            <div class="form-group">
                <label for="nombre">Nombre del Producto:</label>
                <input type="text" id="nombre" name="nombre" required class="form-input" 
                       value="{{ producto.nombre }}">
            </div>
            
            <div class="form-group">
                <label for="categoria">Categoría:</label>
                <select id="categoria" name="categoria" required class="form-input">
                    <option value="entradas" {% if producto.categoria == 'entradas' %}selected{% endif %}>🍤 Entradas</option>
                    <option value="platos_fuertes" {% if producto.categoria == 'platos_fuertes' %}selected{% endif %}>🍖 Platos Fuertes</option>
                    <option value="bebidas" {% if producto.categoria == 'bebidas' %}selected{% endif %}>🥤 Bebidas</option>
                    <option value="postres" {% if producto.categoria == 'postres' %}selected{% endif %}>🍰 Postres</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="precio">Precio:</label>
                <input type="number" id="precio" name="precio" required class="form-input" 
                       min="0" step="100" value="{{ producto.precio }}">
            </div>
            
            <div class="form-group">
                <label for="stock">Stock:</label>
                <input type="number" id="stock" name="stock" required class="form-input" 
                       min="0" value="{{ producto.stock }}">
            </div>
        </div>
        
        <div class="form-group">
            <label for="descripcion">Descripción:</label>
            <textarea id="descripcion" name="descripcion" class="form-input" 
                      rows="4">{{ producto.descripcion }}</textarea>
        </div>

        <div class="form-group">
            <label for="estado">Estado:</label>
            <select id="estado" name="estado" required class="form-input">
                <option value="disponible" {% if producto.estado == 'disponible' %}selected{% endif %}>🟢 Disponible</option>
                <option value="agotado" {% if producto.estado == 'agotado' %}selected{% endif %}>🔴 Agotado</option>
            </select>
        </div>
        
        <!-- ===== SECCIÓN ACTUALIZADA ===== -->
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">💾 Guardar Cambios</button>
            <!-- Texto del botón actualizado -->
            <a href="{{ url_for('listar_productos') }}" class="btn btn-outline">↩️ Volver a Productos</a>
        </div>
    </form>
</div>
{% endblock %}
