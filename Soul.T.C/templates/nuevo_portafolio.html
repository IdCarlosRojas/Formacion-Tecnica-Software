{% extends "Base.html" %}
{% block title %}Añadir al Portafolio{% endblock %}

{% block content %}
<a href="{{ url_for('artista_dashboard') }}" style="color: var(--color-text-muted); margin-bottom: 1rem; display: inline-block;">⟵ Volver al Panel</a>

<div class="form-container" style="max-width: 700px; margin-top: 1rem;">
  <form method="POST" enctype="multipart/form-data">
    <h2 style="text-align: center;">Añadir Nuevo Trabajo</h2>
    
    <div class="form-group">
      <label for="titulo">Título del Trabajo (ej. "Manga Dragon Ball", "Tigre Realista")</label>
      <input type="text" id="titulo" name="titulo" required>
    </div>

    <div class="form-group">
      <label for="descripcion">Descripción (Opcional)</label>
      <textarea id="descripcion" name="descripcion" rows="4"></textarea>
    </div>

    <div class="form-group">
      <label for="imagenes">Imágenes del Tatuaje (Puedes seleccionar varias)</label>
      <input type="file" id="imagenes" name="imagenes" multiple required 
             accept="image/png, image/jpeg, image/jpg" style="padding-top: 10px; height: auto;">
      <small style="color: var(--color-text-muted); display: block; margin-top: 5px;">Formatos permitidos: png, jpg, jpeg.</small>
    </div>

    <button type="submit" class="btn btn-primary btn-full">Subir Trabajo</button>

  </form>
</div>
{% endblock %}
