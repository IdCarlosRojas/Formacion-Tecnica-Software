{% extends "base.html" %}

{% block title %}Agregar Usuario - DigitalFood{% endblock %}

{% block content %}
<div class="dashboard-header">
    <h2>➕ Agregar Usuario</h2>
    <p>Crea un nuevo perfil para el personal</p>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('crear_usuario') }}" class="product-form">
        
        <div class="form-group">
            <label for="nombre">Nombre Completo:</label>
            <input type="text" id="nombre" name="nombre" required class="form-input" 
                   placeholder="Ej: Juan Pérez">
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label for="username">Nombre de Usuario (para login):</label>
                <input type="text" id="username" name="username" required class="form-input" 
                       placeholder="Ej: jperez">
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required class="form-input"
                       placeholder="••••••••">
            </div>
        </div>
        
        <div class="form-group">
            <label for="rol">Rol del Usuario:</label>
            <select id="rol" name="rol" required class="form-input">
                <option value="">Seleccionar rol...</option>
                <option value="mesero">👨‍🍳 Mesero</option>
                <option value="cocinero">🍳 Cocinero</option>
                <option value="admin">👨‍💼 Administrador</option>
            </select>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">➕ Agregar Usuario</button>
            <a href="{{ url_for('listar_usuarios') }}" class="btn btn-outline">↩️ Volver a Usuarios</a>
        </div>
    </form>
</div>
{% endblock %}
