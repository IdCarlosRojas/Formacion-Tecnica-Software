{% extends "admin_base_custom.html" %}

{% block title %}{% if clase %}Editar Clase{% else %}Crear Clase{% endif %}{% endblock %}

{% block content %}
    {% if clase %}
        <h1>Editar Clase: {{ clase.NombreClase }}</h1>
    {% else %}
        <h1>Crear Nueva Clase</h1>
    {% endif %}

    <div class="admin-form-container">
        <form method="POST">
            <div class="form-grid">
                <div class="form-group">
                    <label for="nombre">Nombre de la Clase</label>
                    <input type="text" id="nombre" name="nombre" value="{{ clase.NombreClase if clase else '' }}" required>
                </div>
                
                <div class="form-group">
                    <label for="cupo">Cupo Máximo</label>
                    <input type="number" id="cupo" name="cupo" value="{{ clase.CupoMaximo if clase else '' }}" required>
                </div>
                
                <div class="form-group full-width">
                    <label for="fecha_hora">Fecha y Hora (YYYY-MM-DDTHH:MM)</label>
                    <input type="datetime-local" id="fecha_hora" name="fecha_hora" value="{{ clase.FechaHora.strftime('%Y-%m-%dT%H:%M') if clase else '' }}" required>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Guardar Clase</button>
                </div>
            </div>
        </form>
    </div>
{% endblock %}
