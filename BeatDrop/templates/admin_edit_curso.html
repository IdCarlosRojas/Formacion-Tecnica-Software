{% extends 'base_layout.html' %}
{% block title %}Editar Curso | BeatDrop{% endblock %}
{% block main_class %}main-content{% endblock %}

{% block content %}
<div class="form-container">
  <a href="{{ url_for('admin_cursos') }}">&larr; Volver a Cursos</a>
  <h2>Editar Curso: {{ curso.Titulo }}</h2>
  
  <form action="{{ url_for('admin_edit_curso', curso_id=curso.CursoId) }}" method="POST" enctype="multipart/form-data">
    <div class="form-grid">
      
      <div class="form-group full-width">
        <label for="titulo">Título del Curso</label>
        <input type="text" id="titulo" name="titulo" value="{{ curso.Titulo }}" required>
      </div>

      <div class="form-group full-width">
        <label for="descripcion">Descripción</label>
        <textarea id="descripcion" name="descripcion">{{ curso.Descripcion }}</textarea>
      </div>

      <div class="form-group">
        <label for="precio">Precio ($)</label>
        <input type="number" step="0.01" id="precio" name="precio" value="{{ curso.Precio }}" required>
      </div>
      
      <div class="form-group">
        <label for="categoria">Categoría</label>
        <input type="text" id="categoria" name="categoria" value="{{ curso.Categoria }}" required>
      </div>
      
      <div class="form-group">
        <label for="instructor">Instructor (Nombre de Usuario)</label>
        <input type="text" id="instructor" name="instructor" value="{{ curso.Instructor }}" required>
      </div>

      <div class="form-group">
        <label for="imagen">Reemplazar Imagen (Opcional)</label>
        <input type="file" id="imagen" name="imagen" accept="image/png, image/jpeg">
        <small>Imagen actual:</small>
        <img src="{{ url_for('static', filename=curso.ImagenUrl) }}" alt="Cover" style="width: 150px; height: auto; object-fit: cover; border-radius: 6px; margin-top: 5px;">
      </div>
      
      <div class="form-actions">
        <button type="submit" class="btn primary">Guardar Cambios</button>
      </div>
    </div>
  </form>
</div>
{% endblock %}
