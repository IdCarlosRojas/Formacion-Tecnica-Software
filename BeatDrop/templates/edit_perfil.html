{% extends 'base_layout.html' %}
{% block title %}Editar Perfil | BeatDrop{% endblock %}
{% block main_class %}main-content{% endblock %}

{% block content %}
<div class="form-container">
  <h2>Editar Perfil</h2>
  <p class="section-desc">Actualiza tu información pública.</p>
  
  <form action="{{ url_for('edit_perfil') }}" method="POST" enctype="multipart/form-data">
    <div class="form-grid">
      
      <div class="form-group">
        <label for="nombre">Nombre Completo</label>
        <input type="text" id="nombre" name="nombre" value="{{ usuario.Nombre }}" required>
      </div>
      
      <div class="form-group">
        <label for="username">Nombre de Usuario</label>
        <input type="text" id="username" name="username" value="{{ usuario.NombreUsuario }}" required>
      </div>
      
      <div class="form-group full-width">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" name="email" value="{{ usuario.Email }}" required>
      </div>
      
      <div class="form-group full-width">
        <label for="bio">Biografía</label>
        <textarea id="bio" name="bio">{{ usuario.Bio or '' }}</textarea>
      </div>
      
      <div class="form-group full-width">
        <label for="foto_perfil">Cambiar Foto de Perfil</label>
        <input type="file" id="foto_perfil" name="foto_perfil" accept="image/png, image/jpeg">
      </div>
      
      <div class="form-actions">
        <button type="submit" class="btn primary">Guardar Cambios</button>
      </div>
    </div>
  </form>
</div>
{% endblock %}
