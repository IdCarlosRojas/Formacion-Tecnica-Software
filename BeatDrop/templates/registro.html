{% extends 'base_auth.html' %}
{% block title %}Registro | BeatDrop{% endblock %}

{% block content %}
<h2>Crear Cuenta</h2>
<form action="{{ url_for('registro') }}" method="POST" class="auth-form">
  <label for="nombre">Nombre Completo</label>
  <input type="text" id="nombre" name="nombre" required>
  
  <label for="usuario">Nombre de Usuario</label>
  <input type="text" id="usuario" name="usuario" required>

  <label for="correo">Correo electrónico</label>
  <input type="email" id="correo" name="correo" required>
  
  <label for="contraseña">Contraseña</label>
  <input type="password" id="contraseña" name="contraseña" required>
  
  <div class="form-group-checkbox">
    <input type="checkbox" id="terminos" name="terminos" required>
    <label for="terminos">
      He leído y acepto los <a href="{{ url_for('terminos') }}" target="_blank">Términos y Condiciones</a> y la Política de Privacidad de BeatDrop.
    </label>
  </div>
  
  <button type="submit" class="btn primary full">Crear cuenta</button>
</form>

<p class="auth-link">
  ¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia sesión</a>
</p>
{% endblock %}
