{% extends "Base.html" %}
{% block title %}Registro{% endblock %}

{% block content %}
  <div class="form-container">
    <form action="{{ url_for('registro') }}" method="POST">
      <h2 style="text-align: center;">Crear Cuenta</h2>
      
      <div class="form-group">
        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" name="nombre" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="contraseña">Contraseña</label>
        <input type="password" id="contraseña" name="contraseña" required>
      </div>

      <div class="form-group">
        <label for="telefono">Teléfono (Opcional)</label>
        <input type="tel" id="telefono" name="telefono">
      </div>

      <div class="form-group">
        <label for="tipo">Tipo de cuenta</label>
        <select id="tipo" name="tipo" required>
          <option value="cliente">Soy Cliente</option>
          <option value="tatuador">Soy Tatuador</option>
        </select>
      </div>
      
      <button type="submit" class="btn btn-primary btn-full">Registrarse</button>
      
      <p style="text-align: center; margin-top: 1.5rem; color: var(--color-text-muted);">
        ¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia Sesión</a>
      </p>
    </form>
  </div>
{% endblock %}
