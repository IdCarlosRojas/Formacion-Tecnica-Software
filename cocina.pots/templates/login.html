{% extends "base.html" %}

{% block title %}Iniciar Sesión - DigitalFood{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <h2>🍽️ Iniciar Sesión</h2>
        <p class="login-subtitle">Sistema DigitalFood - Restaurante POTS</p>

        <div id="rol-selection" style="margin-top: 2rem;">
            <a href="{{ url_for('login') }}?rol=mesero" class="btn btn-outline btn-block" style="margin-bottom: 1rem;">
                👨‍🍳 Ingresar como Mesero
            </a>

            <button type="button" id="show-admin-login" class="btn btn-primary btn-block">
                👨‍💼 Ingresar como Administrador
            </button>
        </div>

        <form method="POST" action="{{ url_for('login') }}" id="admin-password-form" style="display: none; margin-top: 1.5rem;">
            <p style="font-weight: 600; text-align: center;">Ingreso de Administrador:</p>
            <div class="form-group" style="margin-top: 1rem;">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required class="form-input" placeholder="••••••••">
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">Ingresar al Sistema</button>
            <button type="button" id="cancel-admin-login" class="btn btn-outline btn-block" style="margin-top: 0.5rem;">
                ↩️ Cancelar
            </button>
        </form>

        <script>
            // Espera a que el documento esté listo
            document.addEventListener('DOMContentLoaded', function() {
                
                const rolSelection = document.getElementById('rol-selection');
                const adminForm = document.getElementById('admin-password-form');
                const showAdminBtn = document.getElementById('show-admin-login');
                const cancelAdminBtn = document.getElementById('cancel-admin-login');
                const passwordInput = document.getElementById('password');

                // Al hacer clic en "Administrador"
                showAdminBtn.addEventListener('click', function() {
                    rolSelection.style.display = 'none';  // Oculta los botones
                    adminForm.style.display = 'block';    // Muestra el formulario de contraseña
                    passwordInput.focus();                // Pone el cursor en el campo de contraseña
                });

                // Al hacer clic en "Cancelar"
                cancelAdminBtn.addEventListener('click', function() {
                    adminForm.style.display = 'none';      // Oculta el formulario
                    rolSelection.style.display = 'block';    // Muestra los botones de nuevo
                });
            });
        </script>

    </div>
</div>
{% endblock %}
